name: Automated Tests

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      run_full_stack:
        description: "Run full integration/regression suite on self-hosted runner"
        required: false
        default: false
        type: boolean

jobs:
  unit-tests:
    name: Unit Tests (Hosted)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest -v tests/test_utils.py

  full-stack-tests:
    name: Full Stack Tests (Self-Hosted)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_full_stack == true }}
    runs-on: self-hosted
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full suite (unit + integration + regression)
        env:
          PYTHONPATH: .
        run: |
          pytest -v -ra
